<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Explore India</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Navbar -->
  <header>
    <h1>🇮🇳 Explore India</h1>
    <input type="text" id="search" placeholder="Search city...">
  </header>

  <!-- Hero Section -->
  <section class="hero">
    <h2>Discover Beautiful Places in India</h2>
    <p>Find tourist spots, travel tips, and more</p>
  </section>

  <!-- Cities Container -->
  <section id="cities" class="container"></section>

  <!-- Modal (Details) -->
  <div id="modal" class="modal">
    <div class="modal-content">
      <span id="close">&times;</span>
      <div id="details"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
        </html>
